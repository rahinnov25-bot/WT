<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student List DOM Practice</title>
<link rel="stylesheet" href="dom.css">
</head>

<body>

<h1>Student List</h1>

<!-- Student Form -->
<form id="student-form">
<label for="student-roll">Roll No:</label>
<input type="text" id="student-roll" placeholder="Enter roll number">

<label for="student-name">Student Name:</label>
<input type="text" id="student-name" placeholder="Enter student name">

<button type="submit" id="add-button" disabled>Add Student</button>
</form>

<!-- Search Student -->
<input type="text" id="search-student" placeholder="Search student...">

<!-- Student List -->
<ul id="student-list"></ul>

<!-- Total Student Count -->
<p id="student-count">Total students: 0</p>

<!-- Present/Absent Count -->
<p id="present-absent-count">Present: 0, Absent: 0</p>

<script>

// Enable/Disable Add button when typing
document.getElementById('student-name').addEventListener('input', toggleAddButton);

function toggleAddButton() {
    let nameInput = document.getElementById('student-name').value;
    let addButton = document.getElementById('add-button');

    if (nameInput.trim() === '') {
        addButton.disabled = true;
    } else {
        addButton.disabled = false;
    }
}


// Search/filter students
document.getElementById('search-student').addEventListener('input', filterStudents);

function filterStudents() {

    let searchText = document.getElementById('search-student').value.toLowerCase();
    let students = document.querySelectorAll('.student-item');

    students.forEach(student => {

        let studentText = student.querySelector('span').textContent.toLowerCase();

        if (studentText.includes(searchText)) {
            student.style.display = '';
        } else {
            student.style.display = 'none';
        }

    });
}


// Form submission
document.getElementById('student-form').addEventListener('submit', addStudent);


// Add student
function addStudent(event) {

    event.preventDefault();

    let studentRoll = document.getElementById('student-roll').value;
    let studentName = document.getElementById('student-name').value;

    if (studentRoll === '' || studentName === '') {
        alert('Please enter roll number and student name');
        return;
    }

    let li = document.createElement('li');
    li.classList.add('student-item');

    li.dataset.present = "false";

    let span = document.createElement('span');
    span.textContent = studentRoll + " – " + studentName;

    // Present checkbox
    let presentLabel = document.createElement('label');
    presentLabel.style.marginLeft = "10px";

    let presentCheckbox = document.createElement('input');
    presentCheckbox.type = "checkbox";
    presentCheckbox.classList.add('present-checkbox');

    presentLabel.appendChild(presentCheckbox);
    presentLabel.appendChild(document.createTextNode(" Present"));

    presentCheckbox.addEventListener('change', function () {
        togglePresent(li, presentCheckbox.checked);
    });

    // Edit button
    let editButton = document.createElement('button');
    editButton.textContent = 'Edit';
    editButton.classList.add('btn-edit');
    editButton.addEventListener('click', function () {
        editStudent(li, span);
    });

    // Delete button
    let deleteButton = document.createElement('button');
    deleteButton.textContent = 'Delete';
    deleteButton.classList.add('btn-delete');
    deleteButton.addEventListener('click', function () {
        deleteStudent(li);
    });

    li.appendChild(span);
    li.appendChild(presentLabel);
    li.appendChild(editButton);
    li.appendChild(deleteButton);

    document.getElementById('student-list').appendChild(li);

    updateStudentCount();
    updatePresentAbsentCount();

    document.getElementById('student-roll').value = '';
    document.getElementById('student-name').value = '';
    document.getElementById('add-button').disabled = true;
}


// Delete student
function deleteStudent(studentElement) {
    studentElement.remove();
    updateStudentCount();
    updatePresentAbsentCount();
}


// Edit student
function editStudent(studentElement, studentNameElement) {

    let currentText = studentNameElement.textContent.split(" – ");
    let currentRoll = currentText[0];
    let currentName = currentText[1];

    let newRoll = prompt('Enter the new roll number:', currentRoll);
    let newName = prompt('Enter the new name:', currentName);

    if (newRoll !== null && newRoll !== '' && newName !== null && newName !== '') {
        studentNameElement.textContent = newRoll + " – " + newName;
    }
}


// Highlight students
function changeListStyle() {
    let students = document.querySelectorAll('.student-item');

    students.forEach(student => {
        student.classList.toggle('highlight');
    });
}


// Highlight button
let changeStyleButton = document.createElement('button');
changeStyleButton.textContent = 'Highlight Students';
changeStyleButton.addEventListener('click', changeListStyle);
document.body.appendChild(changeStyleButton);


// Sort students alphabetically
function sortStudentsAZ() {

    const ul = document.getElementById('student-list');

    const items = Array.from(ul.querySelectorAll('.student-item'));

    items.sort((a, b) => {

        const textA = a.querySelector('span').textContent;
        const textB = b.querySelector('span').textContent;

        const nameA = textA.split(' – ')[1].toLowerCase();
        const nameB = textB.split(' – ')[1].toLowerCase();

        return nameA.localeCompare(nameB);

    });

    items.forEach(li => ul.appendChild(li));
}


// Sort button
let sortButton = document.createElement('button');
sortButton.textContent = "Sort A–Z";
sortButton.addEventListener('click', sortStudentsAZ);
document.body.appendChild(sortButton);


// Update total student count
function updateStudentCount() {
    let total = document.querySelectorAll('.student-item').length;
    document.getElementById('student-count').textContent = "Total students: " + total;
}


// Toggle present/absent
function togglePresent(studentElement, isPresent) {

    studentElement.dataset.present = isPresent ? "true" : "false";

    if (isPresent) {
        studentElement.classList.add('present');
    } else {
        studentElement.classList.remove('present');
    }

    updatePresentAbsentCount();
}


// Update present/absent count
function updatePresentAbsentCount() {

    let students = document.querySelectorAll('.student-item');
    let presentCount = 0;

    students.forEach(student => {
        if (student.dataset.present === "true") {
            presentCount++;
        }
    });

    let total = students.length;
    let absentCount = total - presentCount;

    document.getElementById('present-absent-count').textContent =
        "Present: " + presentCount + ", Absent: " + absentCount;
}

</script>

</body>
</html>
